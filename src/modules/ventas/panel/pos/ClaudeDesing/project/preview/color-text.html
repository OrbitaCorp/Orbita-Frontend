<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; flex-direction:column; gap:10px; }
  .line { display:flex; align-items:baseline; gap:12px; }
  .dot { width:14px; height:14px; border-radius:4px; flex-shrink:0; align-self:center; border:1px solid var(--color-border); }
  .lbl { font-family: var(--font-mono); font-size:12px; color: var(--color-muted); width:120px; }
  .demo { font-family: var(--font-sans); font-size:17px; font-weight:500; }
</style></head>
<body>
  <div class="line"><span class="dot" style="background:#0F172A"></span><span class="lbl">text · #0F172A</span><span class="demo" style="color:#0F172A">Títulos y texto principal</span></div>
  <div class="line"><span class="dot" style="background:#334155"></span><span class="lbl">body · #334155</span><span class="demo" style="color:#334155">Párrafos y descripciones</span></div>
  <div class="line"><span class="dot" style="background:#64748B"></span><span class="lbl">muted · #64748B</span><span class="demo" style="color:#64748B">Labels, placeholders, metadata</span></div>
  <div class="line"><span class="dot" style="background:#94A3B8"></span><span class="lbl">subtle · #94A3B8</span><span class="demo" style="color:#94A3B8">Texto deshabilitado, hints</span></div>
</body></html>
