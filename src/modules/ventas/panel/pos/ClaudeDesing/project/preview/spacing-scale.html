<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; flex-direction:column; gap:7px; }
  .line { display:flex; align-items:center; gap:12px; }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--color-muted); width:64px; flex-shrink:0; }
  .bar { height:14px; background:var(--color-primary); border-radius:3px; }
</style></head>
<body>
  <div class="line"><span class="tok">1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="line"><span class="tok">2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="line"><span class="tok">3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="line"><span class="tok">4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="line"><span class="tok">6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="line"><span class="tok">8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="line"><span class="tok">12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="line"><span class="tok">16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="line"><span class="tok">20 · 80</span><div class="bar" style="width:80px"></div></div>
</body></html>
