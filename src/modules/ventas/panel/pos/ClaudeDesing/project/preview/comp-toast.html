<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface); display:flex; flex-direction:column; gap:12px; font-family:var(--font-sans); }
  .toast { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; background:var(--color-bg); border:1px solid var(--color-border); border-radius:10px; box-shadow:var(--shadow-card); }
  .ico { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; flex-shrink:0; }
  .ttl { font-size:13px; font-weight:600; color:var(--color-text); }
  .desc { font-size:12px; color:var(--color-body); margin-top:2px; }
  svg { width:16px; height:16px; }
</style></head>
<body>
  <div class="toast" style="border-left:3px solid var(--color-success)">
    <div class="ico" style="background:rgba(16,185,129,.1);color:var(--color-success)"><i data-lucide="check-circle"></i></div>
    <div><div class="ttl">Venta registrada</div><div class="desc">Ticket #A-1042 · $12.480,00 cobrado en efectivo.</div></div>
  </div>
  <div class="toast" style="border-left:3px solid var(--color-warning)">
    <div class="ico" style="background:rgba(245,158,11,.1);color:var(--color-warning)"><i data-lucide="alert-triangle"></i></div>
    <div><div class="ttl">Stock bajo</div><div class="desc">Quedan 3 unidades de "Remera básica · M".</div></div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
