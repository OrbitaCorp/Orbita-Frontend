<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; flex-direction:column; gap:13px; }
  .line { display:flex; align-items:baseline; gap:14px; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--color-subtle); width:128px; flex-shrink:0; }
</style></head>
<body>
  <div class="line"><span class="meta">bodyLarge · 18/400</span><span class="t-body-lg" style="color:var(--color-body)">Gestioná tu comercio sin comisiones.</span></div>
  <div class="line"><span class="meta">body · 16/400</span><span class="t-body" style="color:var(--color-body)">Texto de párrafo estándar para contenido general del panel.</span></div>
  <div class="line"><span class="meta">bodySmall · 14/400</span><span class="t-body-sm" style="color:var(--color-body)">Labels de formulario, metadata, descripciones.</span></div>
  <div class="line"><span class="meta">caption · 12/400</span><span class="t-caption" style="color:var(--color-muted)">Timestamps, versiones, texto legal.</span></div>
  <div class="line"><span class="meta">overline · 11/600</span><span class="t-overline">Gestión</span></div>
</body></html>
