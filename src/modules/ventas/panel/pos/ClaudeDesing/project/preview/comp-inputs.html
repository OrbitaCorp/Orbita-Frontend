<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:grid; grid-template-columns:1fr 1fr; gap:16px; font-family:var(--font-sans); }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font-size:14px; font-weight:500; color:var(--color-body); }
  .ipt { display:flex; align-items:center; height:40px; padding:0 12px; gap:6px; background:var(--color-surface); border:1px solid var(--color-border); border-radius:8px; }
  .ipt.focus { border-color:var(--color-primary); box-shadow:0 0 0 3px rgba(59,130,246,.12); }
  .ipt.err { border-color:var(--color-error); }
  .ipt input { flex:1; border:none; outline:none; background:transparent; font-size:14px; color:var(--color-text); font-family:inherit; }
  .pfx { color:var(--color-muted); font-size:14px; font-family:var(--font-mono); }
  .errmsg { font-size:12px; color:var(--color-error); display:flex; align-items:center; gap:4px; }
  svg { width:12px; height:12px; }
</style></head>
<body>
  <div class="field"><label>Producto</label><div class="ipt"><input value="Remera básica" readonly></div></div>
  <div class="field"><label>Precio</label><div class="ipt focus"><span class="pfx">$</span><input value="4.160,00" readonly style="font-family:var(--font-mono)"></div></div>
  <div class="field"><label>SKU</label><div class="ipt" style="background:var(--color-surface-alt);opacity:.6"><input value="7798-2210" disabled style="font-family:var(--font-mono)"></div></div>
  <div class="field"><label>Email cliente</label><div class="ipt err"><input value="cliente@" readonly></div><span class="errmsg"><i data-lucide="alert-circle"></i>Email inválido</span></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
