<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--color-bg); display:flex; }
  .half { flex:1; display:flex; align-items:center; gap:12px; padding:26px; }
  .light { background:#FFFFFF; }
  .dark { background:#0F172A; }
  .wm { font-size:24px; font-weight:600; font-family:var(--font-sans); }
</style></head>
<body>
  <div class="half light">
    <img src="../assets/logo.svg" width="36" height="36" alt="Orbita">
    <span class="wm" style="color:#0F172A">Orbita</span>
  </div>
  <div class="half dark">
    <img src="../assets/logo.svg" width="36" height="36" alt="Orbita">
    <span class="wm" style="color:#F1F5F9">Orbita</span>
  </div>
</body></html>
