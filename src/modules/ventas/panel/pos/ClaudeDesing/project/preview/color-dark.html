<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #0F172A; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color:#94A3B8; }
  .nm { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color:#F1F5F9; margin-top:1px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#0F172A;border:1px solid #334155"><span class="nm">bg · L0</span><span class="hex">#0F172A</span></div>
    <div class="sw" style="background:#1E293B"><span class="nm">surface · L1</span><span class="hex">#1E293B</span></div>
    <div class="sw" style="background:#334155"><span class="nm">alt · L2</span><span class="hex">#334155</span></div>
    <div class="sw" style="background:#475569"><span class="nm">high · L3</span><span class="hex">#475569</span></div>
    <div class="sw" style="background:#60A5FA"><span class="nm" style="color:#0F172A">primary</span><span class="hex" style="color:#1E3A8A">#60A5FA</span></div>
  </div>
</body></html>
