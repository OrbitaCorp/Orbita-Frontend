<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; }
  .nm { font-family: var(--font-sans); font-size: 11px; font-weight: 600; margin-top: 1px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#EFF6FF;color:#1E3A8A"><span class="nm">50</span><span class="hex">#EFF6FF</span></div>
    <div class="sw" style="background:#DBEAFE;color:#1E3A8A"><span class="nm">100</span><span class="hex">#DBEAFE</span></div>
    <div class="sw" style="background:#3B82F6;color:#fff"><span class="nm">500 · primary</span><span class="hex">#3B82F6</span></div>
    <div class="sw" style="background:#2563EB;color:#fff"><span class="nm">600 · hover</span><span class="hex">#2563EB</span></div>
    <div class="sw" style="background:#1D4ED8;color:#fff"><span class="nm">700 · pressed</span><span class="hex">#1D4ED8</span></div>
    <div class="sw" style="background:#1E3A8A;color:#fff"><span class="nm">900</span><span class="hex">#1E3A8A</span></div>
  </div>
</body></html>
