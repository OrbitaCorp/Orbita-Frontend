<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; gap:30px; align-items:center; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .meta { font-family:var(--font-sans); font-size:11px; font-weight:600; color:var(--color-subtle); text-transform:uppercase; letter-spacing:.05em; }
  .m { font-family:var(--font-mono); color:var(--color-text); }
</style></head>
<body>
  <div class="col">
    <span class="meta">Precios</span>
    <span class="m" style="font-size:26px;font-weight:600">$ 12.480,00</span>
    <span class="m" style="font-size:15px;color:var(--color-muted)">3 × $4.160,00</span>
  </div>
  <div class="col">
    <span class="meta">IDs / códigos</span>
    <span class="m" style="font-size:15px">#A-1042</span>
    <span class="m" style="font-size:15px">SKU&nbsp;7798-2210</span>
    <span class="m" style="font-size:13px;color:var(--color-muted)">1–10 de 248</span>
  </div>
</body></html>
