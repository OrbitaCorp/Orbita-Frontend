<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .chip { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:var(--radius-md); }
  .dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .nm { font-family:var(--font-sans); font-size:13px; font-weight:600; }
  .hex { font-family:var(--font-mono); font-size:11px; opacity:.8; margin-left:auto; }
</style></head>
<body>
  <div class="chip" style="background:#ECFDF5"><span class="dot" style="background:#10B981"></span><span class="nm" style="color:#065F46">Success</span><span class="hex" style="color:#065F46">#10B981</span></div>
  <div class="chip" style="background:#FFFBEB"><span class="dot" style="background:#F59E0B"></span><span class="nm" style="color:#B45309">Warning</span><span class="hex" style="color:#B45309">#F59E0B</span></div>
  <div class="chip" style="background:#FEF2F2"><span class="dot" style="background:#EF4444"></span><span class="nm" style="color:#991B1B">Error</span><span class="hex" style="color:#991B1B">#EF4444</span></div>
  <div class="chip" style="background:#EFF6FF"><span class="dot" style="background:#3B82F6"></span><span class="nm" style="color:#1E40AF">Info</span><span class="hex" style="color:#1E40AF">#3B82F6</span></div>
</body></html>
