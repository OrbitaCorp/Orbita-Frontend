<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; flex-direction:column; gap:14px; font-family:var(--font-sans); }
  .grp { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:6px; height:40px; padding:0 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:none; font-family:inherit; }
  .primary { background:var(--color-primary); color:#fff; }
  .secondary { background:var(--color-surface-alt); color:var(--color-text); }
  .ghost { background:transparent; color:var(--color-body); }
  .danger { background:var(--color-error); color:#fff; }
  .outline { background:transparent; color:var(--color-primary); border:1px solid var(--color-primary); }
  .sm { height:32px; padding:0 12px; font-size:13px; }
  .lg { height:48px; padding:0 24px; font-size:15px; font-weight:600; }
  svg { width:16px; height:16px; }
</style></head>
<body>
  <div class="grp">
    <button class="btn primary"><i data-lucide="credit-card"></i>Cobrar</button>
    <button class="btn secondary">Secondary</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn outline">Outline</button>
    <button class="btn danger">Cancelar</button>
  </div>
  <div class="grp">
    <button class="btn primary sm">sm · 32</button>
    <button class="btn primary">md · 40</button>
    <button class="btn primary lg">lg · 48</button>
    <button class="btn primary" style="opacity:.5;cursor:not-allowed">Disabled</button>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
