<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg); display:flex; gap:10px; flex-wrap:wrap; align-items:center; font-family:var(--font-sans); }
  .badge { display:inline-flex; align-items:center; gap:6px; height:24px; padding:0 10px; border-radius:9999px; font-size:12px; font-weight:600; }
  .dot { width:6px; height:6px; border-radius:50%; }
</style></head>
<body>
  <span class="badge" style="background:#FFFBEB;color:#B45309"><span class="dot" style="background:#F59E0B"></span>Pendiente</span>
  <span class="badge" style="background:#ECFDF5;color:#065F46"><span class="dot" style="background:#10B981"></span>Confirmado</span>
  <span class="badge" style="background:#F5F3FF;color:#5B21B6"><span class="dot" style="background:#8B5CF6"></span>En proceso</span>
  <span class="badge" style="background:#EFF6FF;color:#1E40AF"><span class="dot" style="background:#3B82F6"></span>Enviado</span>
  <span class="badge" style="background:#F5F3FF;color:#5B21B6"><span class="dot" style="background:#8B5CF6"></span>En prep.</span>
  <span class="badge" style="background:#ECFDF5;color:#065F46"><span class="dot" style="background:#10B981"></span>Entregado</span>
  <span class="badge" style="background:#EFF6FF;color:#1E40AF"><span class="dot" style="background:#3B82F6"></span>Completado</span>
  <span class="badge" style="background:#FEF2F2;color:#991B1B"><span class="dot" style="background:#EF4444"></span>Cancelado</span>
</body></html>
