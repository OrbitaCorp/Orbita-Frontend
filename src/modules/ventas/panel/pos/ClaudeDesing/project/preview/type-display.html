<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-bg); display:flex; flex-direction:column; gap:14px; }
  .line { display:flex; align-items:baseline; gap:14px; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--color-subtle); width:128px; flex-shrink:0; }
  .spec { color:var(--color-text); }
</style></head>
<body>
  <div class="line"><span class="meta">displayXL · 48/800</span><span class="spec t-display-xl">Orbita</span></div>
  <div class="line"><span class="meta">displayL · 36/700</span><span class="spec t-display-l">Punto de venta</span></div>
  <div class="line"><span class="meta">h1 · 30/700</span><span class="spec t-h1">Cobrar venta</span></div>
  <div class="line"><span class="meta">h2 · 24/600</span><span class="spec t-h2">Resumen de caja</span></div>
  <div class="line"><span class="meta">h3 · 20/600</span><span class="spec t-h3">Medios de pago</span></div>
</body></html>
