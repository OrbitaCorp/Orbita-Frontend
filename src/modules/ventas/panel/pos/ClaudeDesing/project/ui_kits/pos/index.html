<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbita · POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    /* Sora is the POS module's display face (per the POS brief); the rest of the
       system stays on Geist. Scoped here so the global tokens are untouched. */
    :root { --font-display: "Sora", "Geist", system-ui, sans-serif; }
    .dark { --color-primary-bg: #1E3A5F; }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--color-surface); overflow: hidden; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 9999px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-track { background: transparent; }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalIn  { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideIn  { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes orbita-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.8); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Catalog.jsx"></script>
  <script type="text/babel" src="Ticket.jsx"></script>
  <script type="text/babel" src="Modals.jsx"></script>
  <script type="text/babel" src="Modals2.jsx"></script>
  <script type="text/babel" src="OtherScreens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
